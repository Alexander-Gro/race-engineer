<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'"
    />
    <title>Race Engineer</title>
    <style>
      :root {
        --bg: #0b0f14;
        --panel: #11161d;
        --line: #1e2731;
        --text: #e6edf3;
        --muted: #6e7681;
        --good: #3fb950;
        --caution: #e3b341;
        --critical: #ff7b72;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          14px/1.4 ui-monospace,
          monospace;
        background: var(--bg);
        color: var(--text);
        padding: 16px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin: 0 0 12px;
      }
      h1 {
        font-size: 15px;
        font-weight: 600;
        color: var(--good);
        margin: 0;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }
      /* Responsive card grid — glanceable, calm (docs/09). */
      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      .card-title {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 10px;
        font-weight: 600;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 16px;
      }
      .metric-label {
        color: var(--muted);
        font-size: 11px;
      }
      .metric-value {
        font-variant-numeric: tabular-nums;
        font-size: 15px;
      }
      /* Fuel hero number (the value you read mid-drive — docs/09 typography). */
      .fuel-big {
        display: flex;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 10px;
      }
      .fuel-laps {
        font-size: 40px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }
      .fuel-laps-label {
        color: var(--muted);
        font-size: 12px;
      }
      /* 4-corner tyre/brake cells. */
      .corner {
        background: #0d1219;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 8px;
        text-align: center;
      }
      .corner-pos {
        color: var(--muted);
        font-size: 10px;
      }
      .corner-main {
        font-size: 18px;
        font-variant-numeric: tabular-nums;
      }
      .corner-sub {
        font-size: 11px;
        color: var(--muted);
      }
      .position {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      .rival {
        display: grid;
        grid-template-columns: 52px 1fr auto;
        gap: 8px;
        align-items: baseline;
        padding: 3px 0;
        font-variant-numeric: tabular-nums;
      }
      .rival-label {
        color: var(--muted);
        font-size: 11px;
      }
      .rival-closing {
        color: var(--caution);
        font-size: 11px;
      }
      .rival-empty {
        color: var(--muted);
      }
      /* A same-class rival (direct competitor) stands out from lapped/lapping traffic. */
      .rival-sameclass {
        border-left: 2px solid var(--good);
        padding-left: 6px;
      }
      /* Strategy stint plan (T7.8). */
      .stints {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 10px;
      }
      .stint {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: baseline;
        padding: 3px 6px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font-variant-numeric: tabular-nums;
      }
      .stint-current {
        border-color: var(--good);
        background: rgba(63, 185, 80, 0.08);
      }
      .stint-laps {
        font-size: 12px;
      }
      .stint-fuel,
      .stint-deg {
        font-size: 11px;
      }
      /* Engineer call-out feed (recent events). */
      .alerts {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 12px;
      }
      .alert-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 12px;
        background: var(--panel);
      }
      .alert-chip.sev-critical {
        border-color: var(--critical);
      }
      .alert-chip.sev-caution {
        border-color: var(--caution);
      }
      .warn-strip {
        background: rgba(227, 179, 65, 0.12);
        border: 1px solid var(--caution);
        color: var(--caution);
        border-radius: 6px;
        padding: 4px 8px;
        font-size: 12px;
        margin-bottom: 8px;
      }
      /* Ask-the-engineer bar (Track A — free/no-key text Q&A). Lives outside #app so a snapshot
         redraw never wipes the typed question or the last answer. */
      .ask-bar {
        margin: 0 0 12px;
      }
      .ask-form {
        display: flex;
        gap: 8px;
      }
      .ask-input {
        flex: 1;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        padding: 8px 10px;
      }
      .ask-input::placeholder {
        color: var(--muted);
      }
      .ask-btn {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        padding: 8px 14px;
        cursor: pointer;
      }
      .ask-btn:hover {
        border-color: var(--good);
        color: var(--good);
      }
      .ask-answer {
        display: block;
        min-height: 1.4em;
        margin-top: 8px;
        color: var(--good);
      }
      .ask-answer:empty {
        display: none;
      }
      /* Voice settings strip — mic check + output-device picker (T4.5 / docs/16 §1). */
      .voice-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
      }
      .voice-select {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--text);
        font: inherit;
        padding: 6px 8px;
      }
      .voice-status {
        font-variant-numeric: tabular-nums;
      }
      .voice-status.bad {
        color: var(--caution);
      }
      .voice-status.ok {
        color: var(--good);
      }
      /* PTT capture: amber while waiting for a button press. */
      .voice-status.listening {
        color: var(--caution);
      }
      #ptt-binding {
        color: var(--text);
      }
      /* Colour language (docs/09): green = good, amber = caution, red = act-now. */
      .sev-good {
        color: var(--good);
      }
      .sev-caution {
        color: var(--caution);
      }
      .sev-critical {
        color: var(--critical);
      }
      .sev-neutral {
        color: var(--text);
      }
      .sev-unknown {
        color: var(--muted);
      }
      /* Non-colour reinforcement for colourblind drivers (docs/09 accessibility). */
      [data-severity='caution']::before {
        content: '▲ ';
        font-size: 0.8em;
      }
      [data-severity='critical']::before {
        content: '● ';
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Race Engineer — live (synthetic source)</h1>
      <div class="meta" id="meta"></div>
    </header>
    <section class="ask-bar">
      <form class="ask-form" id="ask-form">
        <input
          class="ask-input"
          id="ask-input"
          type="text"
          autocomplete="off"
          placeholder="Ask the engineer — fuel, tyres, position, last lap, when to pit…"
        />
        <button class="ask-btn" type="submit">Ask</button>
        <button class="ask-btn" id="ask-speak" type="button" aria-pressed="true">
          🔊 Voice on
        </button>
      </form>
      <output class="ask-answer" id="ask-answer"></output>
    </section>
    <section class="voice-bar">
      <button class="ask-btn" id="mic-test" type="button">🎤 Test mic</button>
      <span class="voice-status" id="mic-status"></span>
      <button class="ask-btn" id="mic-settings" type="button" hidden>Open settings</button>
      <span style="flex: 1"></span>
      <label for="output-device">Engineer voice out:</label>
      <select class="voice-select" id="output-device">
        <option value="">System default</option>
      </select>
    </section>
    <section class="voice-bar settings-bar">
      <label for="set-profile">Profile</label>
      <select class="voice-select" id="set-profile"></select>
      <label for="set-llm">Engineer</label>
      <select class="voice-select" id="set-llm"></select>
      <label for="set-proactivity">Chatter</label>
      <select class="voice-select" id="set-proactivity"></select>
      <span style="flex: 1"></span>
      <label for="set-slot">API key</label>
      <select class="voice-select" id="set-slot"></select>
      <input
        class="ask-input"
        id="set-key"
        type="password"
        autocomplete="off"
        placeholder="paste key…"
        style="max-width: 180px"
      />
      <button class="ask-btn" id="set-key-save" type="button">Save</button>
      <button class="ask-btn" id="set-key-clear" type="button">Clear</button>
      <span class="voice-status" id="set-keys"></span>
      <span style="flex: 1"></span>
      <label>Est. cost</label>
      <span class="voice-status" id="set-cost"></span>
    </section>
    <section class="voice-bar ptt-bar">
      <label>Push-to-talk</label>
      <span class="voice-status" id="ptt-binding">Unmapped</span>
      <button class="ask-btn" id="ptt-map" type="button">Map button</button>
      <button class="ask-btn" id="ptt-clear" type="button">Clear</button>
      <span class="voice-status" id="ptt-status"></span>
    </section>
    <!-- Future engineer-voice playback target; selecting an output routes it via setSinkId now. -->
    <audio id="engineer-audio" hidden></audio>
    <div id="app">Waiting for the Engineer Core…</div>
    <!-- electron-vite (Vite) bundles this TS entry; in dev it's served with HMR. -->
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
