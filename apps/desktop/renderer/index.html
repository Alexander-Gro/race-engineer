<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'unsafe-inline'"
    />
    <title>Race Engineer</title>
    <style>
      body {
        margin: 0;
        font:
          14px/1.4 ui-monospace,
          monospace;
        background: #0b0f14;
        color: #e6edf3;
        padding: 24px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        color: #7ee787;
        margin: 0 0 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 4px 24px;
      }
      .label {
        color: #8b949e;
      }
      .value {
        font-variant-numeric: tabular-nums;
      }
      .meta {
        margin-top: 16px;
        color: #8b949e;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Race Engineer — live (synthetic source)</h1>
    <div class="grid" id="dash">Waiting for the Engineer Core…</div>
    <div class="meta" id="meta"></div>
    <!-- The bundler (see README) builds renderer.ts → renderer.js -->
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
