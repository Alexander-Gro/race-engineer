name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # The OS-agnostic packages (core, strategy, adapters/sim-replay, …) build and test on
    # Linux. Native Windows integration (shared memory, SDL2, audio, installer) gets a
    # Windows runner once that code lands (M1/M2+).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version comes from the "packageManager" field in package.json.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        # CI never boots Electron (it only typechecks/lints/tests the OS-agnostic packages),
        # so skip the ~100 MB platform binary the `electron` postinstall would otherwise fetch.
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  secret-scan:
    # Block accidental commits of API keys/credentials (CLAUDE.md rule 6, docs/11 §R15).
    # gitleaks-action is free for public repos and individual accounts (no license needed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so pushes scan all commits, not just the tip
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
